<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lena M. Ortiz — W-4</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap");
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(30, 45, 65, .08), transparent 30%),
        #d9d6cf;
    }
    .note {
      position: relative;
      width: 880px;
      min-height: 590px;
      padding: 44px 56px 42px;
      transform: rotate(-1.25deg);
      color: #26313a;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 52px,
          rgba(72, 117, 153, .17) 53px,
          transparent 54px
        ),
        #edf1fb;
      border: 1px solid rgba(74, 66, 48, .15);
      box-shadow: 0 20px 40px rgba(30, 33, 36, .22);
      font-family: "Caveat", "Segoe Print", "Bradley Hand", cursive;
    }
    .note::before {
      content: "";
      position: absolute;
      left: 32px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(192, 78, 76, .25);
    }
    h1 {
      margin: 0 0 20px;
      font-size: 48px;
      line-height: 1;
      font-weight: 600;
      color: #283d52;
    }
    .line {
      min-height: 43px;
      font-size: 28px;
      line-height: 1.28;
      font-weight: 500;
      letter-spacing: .2px;
    }
    .pin {
      position: absolute;
      right: 38px;
      top: 24px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #bd4d47;
      box-shadow: 1px 3px 3px rgba(20, 20, 20, .24);
    }
  </style>
</head>
<body>
  <main class="note">
    <span class="pin"></span>
    <h1>Lena M. Ortiz — W-4</h1>
    <div class="line">SSN 123 – 45 – 6789</div>
    <div class="line">filing: HEAD OF HOUSEHOLD</div>
    <div class="line">only one job (do not check multiple-jobs box)</div>
    <div class="line">1 child under 17 + mom as other dependent</div>
    <div class="line">extra withholding $75 ? confirm</div>
  </main>
</body>
</html>
